<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livros - Biblioteca</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Biblioteca</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="books.html" class="active">Livros</a>
      <a href="readers.html">Leitores</a>
      <a href="loans.html">Empréstimos</a>
      <a href="#" onclick="logout()">Sair</a>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Livros</h1>
        <div class="user-box">
          <span id="userName"></span>
          <button class="btn" onclick="submitBook()">Guardar Livro</button>
        </div>
      </div>

      <div class="panel">
        <h3>Novo Livro</h3>

        <div class="form-grid">
          <div class="form-group">
            <label>Código</label>
            <input id="codigo">
          </div>

          <div class="form-group">
            <label>Título</label>
            <input id="titulo">
          </div>

          <div class="form-group">
            <label>Autor</label>
            <input id="autor">
          </div>

          <div class="form-group">
            <label>Categoria</label>
            <input id="categoria">
          </div>

          <div class="form-group">
            <label>Editora</label>
            <input id="editora">
          </div>

          <div class="form-group">
            <label>Ano</label>
            <input id="ano">
          </div>

          <div class="form-group">
            <label>ISBN</label>
            <input id="isbn">
          </div>

          <div class="form-group">
            <label>Quantidade Total</label>
            <input id="quantidadeTotal" type="number">
          </div>

          <div class="form-group">
            <label>Estante</label>
            <input id="estante">
          </div>
        </div>

        <div class="form-group">
          <label>Observações</label>
          <textarea id="observacoes"></textarea>
        </div>

        <div id="bookMsg"></div>
      </div>

      <div class="panel">
        <h3>Lista de Livros</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Código</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Categoria</th>
                <th>Disponível</th>
              </tr>
            </thead>
            <tbody id="booksTable"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/books.js"></script>
</body>
</html>
