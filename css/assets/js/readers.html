<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitores - Biblioteca</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Biblioteca</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="books.html">Livros</a>
      <a href="readers.html" class="active">Leitores</a>
      <a href="#" onclick="logout()">Sair</a>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1>Leitores</h1>
        <div class="user-box">
          <span id="userName"></span>
          <button class="btn" onclick="submitReader()">Guardar Leitor</button>
        </div>
      </div>

      <div class="panel">
        <h3>Novo Leitor</h3>
        <div class="form-grid">
          <div class="form-group"><label>Nome</label><input id="nome"></div>
          <div class="form-group"><label>Telefone</label><input id="telefone"></div>
          <div class="form-group"><label>Email</label><input id="email"></div>
          <div class="form-group"><label>BI</label><input id="bi"></div>
          <div class="form-group"><label>Morada</label><input id="morada"></div>
          <div class="form-group"><label>Tipo de Leitor</label><input id="tipoLeitor"></div>
        </div>
        <div id="readerMsg"></div>
      </div>

      <div class="panel">
        <h3>Lista de Leitores</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Email</th>
                <th>BI</th>
                <th>Tipo</th>
              </tr>
            </thead>
            <tbody id="readersTable"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/readers.js"></script>
</body>
</html>
